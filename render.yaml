# ─────────────────────────────────────────────────────────────────────────────
# Managed Postgres — REQUIRED for user accounts to survive across deploys.
#
# Render's container filesystem is EPHEMERAL: SQLite files written to
# the container disk (the previous DATABASE_URL fallback) are wiped on
# every redeploy / restart / scale event. That's why newly-registered
# users like "rajat" kept disappearing — they were written to a SQLite
# file that no longer exists on the next boot.
#
# This Postgres database persists user accounts (and projects, rules,
# dq_config, etc.) regardless of how many times the API container is
# recycled. Free tier is fine for low single-digit concurrent users.
# ─────────────────────────────────────────────────────────────────────────────
databases:
  - name: data-cleaning-hub-db
    plan: free
    databaseName: data_cleaning_hub
    user: data_cleaning_hub
    region: oregon
    ipAllowList: []   # only the linked Render service can reach it

services:
  - type: web
    name: data-cleaning-hub-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false
      - key: AZURE_OPENAI_MAX_RPM
        value: "60"
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      # Render injects the managed Postgres connection string here at
      # deploy time. The application reads DATABASE_URL via db.py and
      # falls back to a local SQLite ONLY when the env var is missing
      # (i.e. local development) — but on Render it'll always be set.
      - key: DATABASE_URL
        fromDatabase:
          name: data-cleaning-hub-db
          property: connectionString

  - type: web
    name: data-cleaning-hub-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
